name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .[dev]
      - name: Format check
        run: python -m black --check .
      - name: Lint
        run: python -m ruff check .
      - name: Governance gates
        run: |
          python tests/gates/check_project_boundary_leaks.py
          python tests/gates/check_runtime_reusability.py
          python tests/gates/check_hardcoded_project_dependencies.py
          python tests/gates/check_extension_isolation.py
          python tests/gates/check_consumer_runtime_isolation.py
          python tests/gates/check_extension_dependency_leaks.py
          python tests/gates/check_optional_dependency_boundaries.py
      - name: Bootstrap validation
        run: python -m ai_dev_os.bootstrap.init_project --type scientific --name ci-scientific-project --runtime-type scientific --scientific-mode --output-dir _tmp_bootstrap_check
      - name: Installed namespace smoke
        run: python -c "import ai_dev_os, ai_dev_os.bootstrap, ai_dev_os.cli, ai_dev_os.context_subset, ai_dev_os.copilot_usage, ai_dev_os.governance, ai_dev_os.prompt_modes, ai_dev_os.repository_intelligence, ai_dev_os.retrieval, ai_dev_os.session_lifecycle, ai_dev_os.session_orchestrator, ai_dev_os.telemetry, ai_dev_os.integrations, ai_dev_os.workspace_snapshot"
      - name: Tests
        run: python -m pytest
      - name: Retrieval scaling validation
        run: python -m pytest tests/retrieval_scaling
      - name: Provider simulation validation
        run: python -m pytest tests/provider_simulation
      - name: Copilot usage validation
        run: python -m pytest tests/copilot_usage
      - name: Session lifecycle validation
        run: python -m pytest tests/session_lifecycle
      - name: Session orchestrator validation
        run: python -m pytest tests/session_orchestrator
      - name: Repository intelligence validation
        run: python -m pytest tests/repository_intelligence
      - name: Workspace snapshot validation
        run: python -m pytest tests/workspace_snapshot
      - name: Context subset validation
        run: python -m pytest tests/context_subset
      - name: Prompt modes validation
        run: python -m pytest tests/prompt_modes
      - name: Runtime enforcement audit
        run: python -m ai_dev_os.runtime_audit
      - name: Build validation
        run: python -m build
      - name: README and package metadata validation
        run: python -m twine check dist/*

  optional-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install optional extras smoke set
        run: |
          python -m pip install -e .[telemetry]
          python -m pip install -e .[scientific]
          python -m pip install -e .[routing]
      - name: Import smoke
        run: python -c "import ai_dev_os, ai_dev_os.cli, ai_dev_os.context_subset, ai_dev_os.copilot_usage, ai_dev_os.governance, ai_dev_os.prompt_modes, ai_dev_os.repository_intelligence, ai_dev_os.retrieval, ai_dev_os.session_lifecycle, ai_dev_os.session_orchestrator, ai_dev_os.telemetry, ai_dev_os.integrations, ai_dev_os.providers, ai_dev_os.workspace_snapshot"